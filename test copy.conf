worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20m;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Rate Limiting Zone
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Upstream: Node.js backend
    upstream app_backend {
        server app:8080;
        keepalive 32;
    }

    # ─── Default server: block unknown Host requests ──────────────────
    server {
        listen 80 default_server;
        listen 443 default_server ssl;
        server_name _;
        server_tokens off;

        # Self-signed fallback (prevents nginx crash if no cert for unknown hosts)
        ssl_reject_handshake on;

        # Prometheus nginx-exporter 전용 (Docker 내부망만)
        location = /nginx-status {
            stub_status;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            deny all;
            access_log off;
        }

        location / {
            return 444;
        }
    }

    # ─── HTTP → HTTPS redirect ────────────────────────────────────────
    server {
        listen 80;
        server_name www.p6ix.co.kr p6ix.co.kr 115.68.110.76 localhost;
        server_tokens off;

        # Certbot webroot verification
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Prometheus nginx-exporter 전용 (Docker 내부망만 허용)
        location = /nginx-status {
            stub_status;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            deny all;
            access_log off;
        }

        # ─── Video files: nginx direct serving (HTTP) ──────────────────
        location /assets/videos/ {
            alias /srv/videos/assets/videos/;
            expires 7d;
            add_header Cache-Control "public";
            add_header Accept-Ranges bytes;
            access_log off;
        }

        location /videos/ {
            alias /srv/videos/;
            expires 7d;
            add_header Cache-Control "public";
            add_header Accept-Ranges bytes;
            access_log off;
        }

        # ─── Bot/Scanner blocking (HTTP) ──────────────────────────────
        location ~* \.(php|asp|aspx|jsp|cgi|pl)$ {
            access_log off;
            return 444;
        }

        location ~* (eval-stdin|invokefunction|pearcmd|wp-login|wp-admin|xmlrpc\.php|containers/json|\.env$) {
            access_log off;
            return 444;
        }

        # Redirect all HTTP → HTTPS (domain only)
        location / {
            # IP/localhost access stays on HTTP, domain goes to HTTPS
            if ($host ~* ^(www\.)?p6ix\.co\.kr$) {
                return 301 https://www.p6ix.co.kr$request_uri;
            }

            # IP/localhost fallback: proxy directly
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }
    server {
        listen 80;
        server_name cpm.p6ix.co.kr;
        server_tokens off;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://cpm.p6ix.co.kr$request_uri;
        }
    }    

    server {
        listen 80;
        server_name gw.p6ix.co.kr;
        server_tokens off;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://gw.p6ix.co.kr$request_uri;
        }
    }

    # ─── HTTPS Main server ────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name www.p6ix.co.kr p6ix.co.kr;

        # SSL Configuration
        ssl_certificate     /etc/letsencrypt/live/www.p6ix.co.kr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.p6ix.co.kr/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security Headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
        # index.html은 절대 캐싱 금지 — 배포 후 구 청크 해시 참조 방지
        # (location ~* \.js$ 등 자체 add_header 있는 블록엔 이 헤더가 상속되지 않음)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;

        # Hide nginx version
        server_tokens off;

        # Redirect non-www → www
        if ($host = p6ix.co.kr) {
            return 301 https://www.p6ix.co.kr$request_uri;
        }

        # ─── Video files: nginx direct serving ──────────────────────────
        location /assets/videos/ {
            alias /srv/videos/assets/videos/;
            expires 7d;
            add_header Cache-Control "public";
            add_header Accept-Ranges bytes;
            access_log off;
        }

        location /videos/ {
            alias /srv/videos/;
            expires 7d;
            add_header Cache-Control "public";
            add_header Accept-Ranges bytes;
            access_log off;
        }

        # Health check endpoint
        location = /nginx-health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Prometheus nginx-exporter 전용 (Docker 내부망만 허용)
        location = /nginx-status {
            stub_status;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            deny all;
            access_log off;
        }
        # ─── p6ix-iam reverse proxy ─────────────────────────────────────
        # 별도 Docker 컨테이너(p6ix_cpe:7210)로 프록시.
        # resolver 방식: CPE 컨테이너 미실행 시에도 nginx 정상 기동.
	location = /p6ix-iam {
    		return 301 /p6ix-iam/;
	}

	location ^~ /p6ix-iam/ {
    		proxy_pass http://115.68.110.76:5000/;
    		proxy_http_version 1.1;

    		proxy_set_header Host $host;
    		proxy_set_header X-Forwarded-Host $host;
    		proxy_set_header X-Forwarded-Proto https;
    		proxy_set_header X-Forwarded-Port 443;
    		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    		proxy_set_header X-Real-IP $remote_addr;
	}

        # ─── p6ix-cpe reverse proxy ─────────────────────────────────────
        # 별도 Docker 컨테이너(p6ix_cpe:7210)로 프록시.
        # resolver 방식: CPE 컨테이너 미실행 시에도 nginx 정상 기동.
        location = /p6ix-cpe {
            return 301 https://cpm.p6ix.co.kr/;
        }

        location ^~ /p6ix-cpe/ {
            rewrite ^/p6ix-cpe/?(.*)$ https://cpm.p6ix.co.kr/$1 permanent;
        }

        location ^~ /p6ix-cpe/api/ {
            rewrite ^/p6ix-cpe/api/?(.*)$ https://cpm.p6ix.co.kr/api/$1 permanent;
        }

        # ─── p6ix-groupware reverse proxy ─────────────────────────────────────
        # 별도 Docker 컨테이너(p6ix_groupware:7211)로 프록시.
        # resolver 방식: groupware 컨테이너 미실행 시에도 nginx 정상 기동.
        location = /groupware {
            return 301 https://gw.p6ix.co.kr/;
        }

        location ^~ /groupware/ {
            rewrite ^/groupware/?(.*)$ https://gw.p6ix.co.kr/$1 permanent;
        }

        location ^~ /groupware/media/ {
            # nginx 직접 서빙 (Django DEBUG 설정 무관, 효율적)
            rewrite ^/groupware/media/?(.*)$ https://gw.p6ix.co.kr/groupware/media/$1 permanent;
        }

        # ─── groupware media (Django MEDIA_URL=/media/) ──────────────────
        # Django API가 /media/... URL로 반환하므로 nginx에서 직접 서빙
        location ^~ /media/ {
            alias /shared/groupware/media/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # ─── groupware WebSocket (chat) ─────────────────────────────────────
        # 프론트 기본값이 /ws/chat/ (prefix 없음)이므로 그대로 프록시.
        # Django(Daphne)는 내부 라우트 /ws/chat/를 기대.
        location ^~ /ws/ {
            resolver 127.0.0.11 valid=30s ipv6=off;
            set $groupware_upstream http://p6ix_groupware:7211;

            proxy_pass $groupware_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 10s;
            proxy_send_timeout 86400s;
            proxy_read_timeout 86400s;
        }


        # ─── Copilot AI API (SSH tunnel → 192.168.0.20:19090) ─────────
        location ^~ /copilot/ {
            proxy_pass http://172.18.0.1:19091/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        location ^~ /groupware/api/ {
            rewrite ^/groupware/api/?(.*)$ https://gw.p6ix.co.kr/groupware/api/$1 permanent;
        }

        # ─── PMIS-X streaming (SSE) ──────────────────────────────────────
        location ~* ^/api/pmis-x/query/stream {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_buffering off;
            proxy_cache off;

            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        location = /api/pmis-x/query {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
        }

        # API endpoints
        location /api/ {
            limit_req zone=api burst=60 nodelay;

            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health endpoint
        location = /health {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            access_log off;
        }

        # All other routes - SPA + SSR
        location / {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header Upgrade $http_upgrade;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 8k;
        }

        # ───── /services/primavera 301 → Oracle Primavera ─────
        # 검색엔진 인덱스 URL 처리 (SEO 301 permanent redirect)
        location = /services/primavera {
            return 301 /oracle-primavera/;
        }

        location ^~ /services/primavera/ {
            return 301 /oracle-primavera/;
        }

        # ───── Oracle Primavera GitHub Pages Proxy ─────

        location = /oracle-primavera {
            return 301 /oracle-primavera/;
        }

        location ^~ /oracle-primavera/ {
            proxy_ssl_server_name on;

            proxy_set_header Host ss0900.github.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass https://ss0900.github.io/oracle-primavera/;

            #upstream redirection
            proxy_redirect https://ss0900.github.io/oracle-primavera/ /oracle-primavera/;
        }

        # ─── Bot/Scanner blocking ─────────────────────────────────────
        # PHP/ASP/JSP 등 우리 스택에 없는 확장자 요청 즉시 차단 (응답 없이 연결 끊기)
        location ~* \.(php|asp|aspx|jsp|cgi|pl)$ {
            access_log off;
            return 444;
        }

        # 알려진 공격 경로 패턴 차단
        location ~* (eval-stdin|invokefunction|pearcmd|wp-login|wp-admin|xmlrpc\.php|containers/json|\.env$) {
            access_log off;
            return 444;
        }

        # Static asset caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";

            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    server {
        listen 443 ssl http2;
        server_name cpm.p6ix.co.kr;
        server_tokens off;

        ssl_certificate     /etc/letsencrypt/live/cpm.p6ix.co.kr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cpm.p6ix.co.kr/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;

        location / {
            alias /shared/frontend/;
            try_files $uri $uri/ /index.html @cpe_placeholder_subdomain;
        }

        location @cpe_placeholder_subdomain {
            default_type text/plain;
            return 200 "Missing";
        }

        location ^~ /api/ {
            resolver 127.0.0.11 valid=30s ipv6=off;
            set $cpe_upstream http://p6ix_cpe:7210;

            limit_req zone=api burst=60 nodelay;

            proxy_pass $cpe_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }    

    server {
        listen 443 ssl;
        http2 on;
        server_name gw.p6ix.co.kr;

        ssl_certificate     /etc/letsencrypt/live/gw.p6ix.co.kr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gw.p6ix.co.kr/privkey.pem;

        location ^~ /api/ {
            resolver 127.0.0.11 valid=30s ipv6=off;

            proxy_pass http://p6ix_groupware:7211;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location ^~ /media/ {
            alias /shared/groupware/media/;
        }

        location ^~ /ws/ {
            resolver 127.0.0.11 valid=30s ipv6=off;

            proxy_pass http://p6ix_groupware:7211;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location / {
            root /shared/groupware/frontend/;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}