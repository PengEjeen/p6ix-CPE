name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Build and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE || '/api' }}
          VITE_PERSIST_LOGIN: ${{ vars.VITE_PERSIST_LOGIN }}
          VITE_USE_SESSION_AUTH: ${{ vars.VITE_USE_SESSION_AUTH }}
          VITE_KEYCLOAK_ENABLED: ${{ vars.VITE_KEYCLOAK_ENABLED }}
          VITE_SSO_NEXT_PATH: ${{ vars.VITE_SSO_NEXT_PATH }}
          VITE_SSO_PROVIDER: ${{ vars.VITE_SSO_PROVIDER }}
          VITE_APP_BASE: ${{ vars.VITE_APP_BASE || '/' }}
        run: npm run build

      - name: Verify frontend SSO API base in bundle
        working-directory: frontend
        run: |
          set -euo pipefail
          test -f dist/index.html
          if ! grep -R --line-number '"/api"' dist/assets/index-*.js > /tmp/frontend-path-check.log; then
            echo "Expected '/api' not found in built bundle."
            echo "Build args may not be applied as expected."
            exit 1
          fi
          sed -n '1,5p' /tmp/frontend-path-check.log

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Django system check
        working-directory: backend
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: SECRET_KEY="${SECRET_KEY:-ci-secret-key}" python manage.py check

      - name: Django tests
        working-directory: backend
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          SECURE_SSL_REDIRECT: "False"
        run: |
          set -euo pipefail
          SECRET_KEY="${SECRET_KEY:-ci-secret-key}" python manage.py test 2>&1 | tee /tmp/django-test.log
          if grep -q "Ran 0 tests" /tmp/django-test.log; then
            echo "No tests were discovered. Failing CI."
            exit 1
          fi

      - name: Build Docker image (validation)
        run: |
          docker build \
            --build-arg VITE_API_BASE="${{ vars.VITE_API_BASE || '/api' }}" \
            --build-arg VITE_PERSIST_LOGIN="${{ vars.VITE_PERSIST_LOGIN }}" \
            --build-arg VITE_USE_SESSION_AUTH="${{ vars.VITE_USE_SESSION_AUTH }}" \
            --build-arg VITE_KEYCLOAK_ENABLED="${{ vars.VITE_KEYCLOAK_ENABLED }}" \
            --build-arg VITE_SSO_NEXT_PATH="${{ vars.VITE_SSO_NEXT_PATH }}" \
            --build-arg VITE_SSO_PROVIDER="${{ vars.VITE_SSO_PROVIDER }}" \
            --build-arg VITE_APP_BASE="${{ vars.VITE_APP_BASE || '/' }}" \
            -t p6ix_cpe:ci .

  cd:
    name: Push image to Docker Hub
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/p6ix_cpe
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            VITE_API_BASE=${{ vars.VITE_API_BASE || '/api' }}
            VITE_PERSIST_LOGIN=${{ vars.VITE_PERSIST_LOGIN }}
            VITE_USE_SESSION_AUTH=${{ vars.VITE_USE_SESSION_AUTH }}
            VITE_KEYCLOAK_ENABLED=${{ vars.VITE_KEYCLOAK_ENABLED }}
            VITE_SSO_NEXT_PATH=${{ vars.VITE_SSO_NEXT_PATH }}
            VITE_SSO_PROVIDER=${{ vars.VITE_SSO_PROVIDER }}
            VITE_APP_BASE=${{ vars.VITE_APP_BASE || '/' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
